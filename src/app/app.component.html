<div class="relative flex min-h-screen flex-col bg-ink-950">
  <!-- Ambient background layer: aurora glow blobs + faint grid -->
  <div aria-hidden="true" class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute inset-0 bg-app-grid"></div>
    <div
      class="absolute -left-32 -top-40 h-[34rem] w-[34rem] rounded-full bg-primary-600/25 blur-[120px] animate-aurora"
    ></div>
    <div
      class="absolute -right-40 top-10 h-[30rem] w-[30rem] rounded-full bg-accent-500/15 blur-[130px] animate-aurora"
      style="animation-delay: -6s"
    ></div>
    <div
      class="absolute bottom-[-12rem] left-1/3 h-[32rem] w-[32rem] rounded-full bg-primary-800/25 blur-[140px] animate-aurora"
      style="animation-delay: -11s"
    ></div>
    <!-- subtle top sheen -->
    <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-primary-400/40 to-transparent"></div>
  </div>

  <div class="relative flex min-h-screen flex-col">
    <app-navbar />
    <main class="flex flex-1 flex-col">
      <router-outlet />
    </main>
  </div>
</div>
