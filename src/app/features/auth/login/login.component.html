<div class="flex min-h-[calc(100vh-57px)] items-center justify-center px-4">
  <div class="w-full max-w-sm rounded-2xl bg-white p-8 shadow-sm ring-1 ring-gray-100">
    <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
    <p class="mt-1 text-sm text-gray-500">Sign in to manage and discover events.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500"
        />
        @if (getErrorMessage('email'); as error) {
          <p class="mt-1 text-xs text-red-600">{{ error }}</p>
        }
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500"
        />
        @if (getErrorMessage('password'); as error) {
          <p class="mt-1 text-xs text-red-600">{{ error }}</p>
        }
      </div>

      @if (serverError()) {
        <p class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">{{ serverError() }}</p>
      }

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">Sign in</app-button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/register" class="font-semibold text-primary-600 hover:text-primary-700">Sign up</a>
    </p>
  </div>
</div>
