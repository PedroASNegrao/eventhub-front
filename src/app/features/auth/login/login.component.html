<div class="flex flex-1 items-center justify-center px-4 py-12">
  <div class="card w-full max-w-sm animate-fade-in-up p-8">
    <span class="pointer-events-none absolute -right-16 -top-16 h-40 w-40 rounded-full bg-primary-600/20 blur-3xl"></span>

    <span class="relative flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-gradient text-white shadow-glow-sm">
      <lucide-icon [img]="CalendarDaysIcon" class="h-5 w-5" />
    </span>
    <h1 class="relative mt-5 text-2xl font-bold tracking-tight text-ink-50">Welcome back</h1>
    <p class="relative mt-1 text-sm text-ink-300">Sign in to manage and discover events.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="relative mt-6 space-y-4">
      <div>
        <label for="email" class="input-label">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" class="input-field" />
        @if (getErrorMessage('email'); as error) {
          <p class="field-error">{{ error }}</p>
        }
      </div>

      <div>
        <label for="password" class="input-label">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" class="input-field" />
        @if (getErrorMessage('password'); as error) {
          <p class="field-error">{{ error }}</p>
        }
      </div>

      @if (serverError()) {
        <p class="alert-error">{{ serverError() }}</p>
      }

      <app-button type="submit" [loading]="loading()" [fullWidth]="true">Sign in</app-button>
    </form>

    <p class="relative mt-6 text-center text-sm text-ink-400">
      Don't have an account?
      <a routerLink="/register" class="font-semibold text-primary-300 transition hover:text-primary-200">Sign up</a>
    </p>
  </div>
</div>
