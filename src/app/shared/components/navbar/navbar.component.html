<nav class="sticky top-0 z-10 border-b border-gray-200/80 bg-white/80 backdrop-blur-md">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3 sm:px-6">
    <a routerLink="/events" class="flex items-center gap-2 text-lg font-bold text-gray-900 transition hover:text-primary-700">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary-600 text-white">
        <lucide-icon [img]="CalendarDaysIcon" class="h-5 w-5" />
      </span>
      EventHub
    </a>

    <div class="flex items-center gap-1 sm:gap-2">
      <a
        routerLink="/events"
        routerLinkActive="bg-primary-50 text-primary-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100"
      >
        Events
      </a>

      @if (currentUser$ | async; as user) {
        @if (user.role === 'ORGANIZER') {
          <a
            routerLink="/events/new"
            routerLinkActive="bg-primary-50 text-primary-700"
            class="flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100"
          >
            <lucide-icon [img]="PlusCircleIcon" class="h-4 w-4" />
            <span class="hidden sm:inline">New Event</span>
          </a>
        }

        <div class="mx-1 hidden h-6 w-px bg-gray-200 sm:block"></div>

        <div class="hidden items-center gap-2 sm:flex">
          <span class="flex h-8 w-8 items-center justify-center rounded-full bg-primary-100 text-sm font-semibold text-primary-700">
            {{ user.name.charAt(0).toUpperCase() }}
          </span>
          <span class="text-sm font-medium text-gray-700">{{ user.name }}</span>
        </div>

        <button
          type="button"
          (click)="logout()"
          aria-label="Logout"
          class="flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100"
        >
          <lucide-icon [img]="LogOutIcon" class="h-4 w-4" />
          <span class="hidden sm:inline">Logout</span>
        </button>
      } @else {
        <a routerLink="/login" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100">
          Login
        </a>
        <a
          routerLink="/register"
          class="rounded-lg bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-primary-700 hover:shadow-md"
        >
          Sign up
        </a>
      }
    </div>
  </div>
</nav>
